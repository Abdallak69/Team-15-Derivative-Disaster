api:
  base_url: https://mock-api.roostoo.com
  timeout_seconds: 10.0

runtime:
  environment: development
  poll_interval_seconds: 60
  trading_cycle_interval_seconds: 300
  heartbeat_interval_seconds: 3600
  clock_sync_interval_seconds: 3600
  sentiment_refresh_interval_seconds: 14400
  strategy_mode: paper
  competition_start: null
  day1_max_deploy: 0.30
  day1_stop_loss_pct: 0.02
  day2_max_deploy: 0.60

regime:
  ema_fast_period: 20
  ema_slow_period: 50
  volatility_lookback: 14
  volatility_threshold_multiplier: 1.5
  confirmation_periods: 2

momentum:
  lookback_periods: [3, 5, 7]
  rsi_threshold: 45
  top_n_assets: 8

mean_reversion:
  rsi_oversold: 30
  bollinger_period: 20
  bollinger_std: 2.0
  min_volume_usd: 10000000
  # Reserved for future use:
  max_hold_days: 3
  stop_loss_pct: 0.05

risk:
  max_position_pct: 0.10
  max_sector_pct: 0.30
  take_profit_pct: 0.08
  cash_floor_bull: 0.20
  cash_floor_ranging: 0.40
  cash_floor_bear: 0.50
  stop_loss_pct: 0.03
  circuit_breaker_l1: 0.03
  circuit_breaker_l2: 0.05
  daily_loss_limit: 0.02

# Not yet wired into the strategy cycle — config reserved for future integration.
pairs_rotation:
  lookback: 60
  adf_threshold: 0.05
  min_half_life: 1.0
  max_half_life: 30.0
  z_entry: 2.0
  max_pairs: 3

sector_rotation:
  btc_heavy_dominance_threshold: 0.57
  large_alt_prefixes: [SOL, BNB, XRP, ADA, AVAX, DOT, MATIC, LINK, DOGE]

sentiment:
  fgi_extreme_fear: 25
  fgi_fear: 35
  fgi_greed: 75
  fgi_extreme_greed: 80
  multiplier_extreme_fear: 1.30
  multiplier_fear: 1.15
  multiplier_greed: 0.85
  multiplier_extreme_greed: 0.70
  funding_rate_bonus_threshold: -0.0001
  funding_rate_bonus_pct: 0.02

execution:
  prefer_limit_orders: true
  limit_offset_pct: 0.0001
  min_rebalance_drift: 0.15
  order_spacing_seconds: 65
