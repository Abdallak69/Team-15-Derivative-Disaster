version: 1
disable_existing_loggers: false

formatters:
  utc_text:
    (): bot.logging_utils.UtcFormatter
    format: "%(asctime)sZ %(levelname)s %(name)s %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"
  trade_json:
    (): bot.logging_utils.JsonLineFormatter

handlers:
  system_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: utc_text
    filename: logs/system.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8
  signals_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: utc_text
    filename: logs/signals.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8
  trades_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: trade_json
    filename: logs/trades.jsonl
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

root:
  level: INFO
  handlers: [system_file]

loggers:
  tradingbot:
    level: INFO
    handlers: [system_file]
    propagate: false
  tradingbot.system:
    level: INFO
    handlers: [system_file]
    propagate: false
  tradingbot.signals:
    level: INFO
    handlers: [signals_file]
    propagate: false
  tradingbot.trades:
    level: INFO
    handlers: [trades_file]
    propagate: false
  tradingbot.api:
    level: INFO
    handlers: [system_file]
    propagate: false
