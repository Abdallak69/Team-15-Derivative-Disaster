version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  system_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/system.log
    maxBytes: 10485760
    backupCount: 5
  signals_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/signals.log
    maxBytes: 10485760
    backupCount: 5
  trades_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: logs/trades.jsonl
    maxBytes: 10485760
    backupCount: 5

root:
  level: INFO
  handlers: [system_file]

loggers:
  tradingbot:
    level: INFO
    handlers: [system_file, signals_file, trades_file]
    propagate: false

